<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickReads — Book Summaries</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --color-bg: #f8f9fa;
  --color-surface: #ffffff;
  --color-text: #1a1a2e;
  --color-text-secondary: #4a5568;
  --color-text-muted: #8993a4;
  --color-primary: #6c63ff;
  --color-primary-light: #eee9ff;
  --color-border: #e2e8f0;
  --color-gold: #f59e0b;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--color-bg); color: var(--color-text); min-height: 100vh; }

.app-header {
  background: var(--color-surface);
  padding: 20px 24px;
  border-bottom: 1px solid var(--color-border);
  position: sticky; top: 0; z-index: 100;
}
.app-header h1 { font-size: 22px; font-weight: 700; }
.app-header h1 i { color: var(--color-primary); margin-right: 8px; }
.app-header p { color: var(--color-text-muted); font-size: 13px; margin-top: 4px; }

.stats-bar {
  display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap;
}
.stat-item {
  font-size: 12px; color: var(--color-text-secondary);
  display: flex; align-items: center; gap: 5px;
}
.stat-item i { font-size: 13px; }
.stat-item .num { font-weight: 700; color: var(--color-primary); }
.stat-item .num.gold { color: var(--color-gold); }

.search-bar { margin: 16px 24px; position: relative; }
.search-bar input {
  width: 100%; padding: 12px 16px 12px 40px;
  border: 1px solid var(--color-border); border-radius: var(--radius);
  font-size: 14px; background: var(--color-surface);
  outline: none; transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--color-primary); }
.search-bar i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); }

.categories {
  display: flex; gap: 8px; padding: 0 24px 16px; overflow-x: auto;
  scrollbar-width: none;
}
.categories::-webkit-scrollbar { display: none; }
.cat-btn {
  padding: 8px 16px; border-radius: 20px; border: 1px solid var(--color-border);
  background: var(--color-surface); font-size: 13px; cursor: pointer;
  white-space: nowrap; transition: all 0.2s;
}
.cat-btn.active, .cat-btn:hover { background: var(--color-primary); color: white; border-color: var(--color-primary); }

.book-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px; padding: 0 24px 24px;
}

.book-card {
  background: var(--color-surface); border-radius: var(--radius);
  border: 1px solid var(--color-border); padding: 20px;
  cursor: pointer; transition: all 0.2s; position: relative;
}
.book-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.book-card.is-read { border-left: 3px solid #10b981; }
.book-card .book-category {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px;
  font-weight: 600;
}
.book-card h3 { font-size: 16px; margin-bottom: 4px; line-height: 1.3; }
.book-card .author { color: var(--color-text-muted); font-size: 13px; margin-bottom: 8px; }
.book-card .read-time { color: var(--color-text-muted); font-size: 12px; }
.book-card .read-time i { margin-right: 4px; }
.book-card .card-badges {
  position: absolute; top: 12px; right: 12px; display: flex; gap: 6px;
}
.card-badges .badge {
  width: 24px; height: 24px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 11px;
}
.badge.read-badge { background: #d1fae5; color: #065f46; }
.badge.fav-badge { background: #fef3c7; color: #92400e; }

.card-actions {
  display: flex; gap: 8px; margin-top: 12px;
}
.card-actions button {
  padding: 6px 12px; border-radius: 6px; border: 1px solid var(--color-border);
  background: var(--color-surface); font-size: 12px; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; gap: 4px;
}
.card-actions button:hover { background: var(--color-primary-light); }
.card-actions button.active-read { background: #d1fae5; border-color: #10b981; color: #065f46; }
.card-actions button.active-fav { background: #fef3c7; border-color: var(--color-gold); color: #92400e; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--color-surface); border-radius: var(--radius);
  max-width: 640px; width: 100%; max-height: 80vh; overflow-y: auto;
  padding: 32px; position: relative;
}
.modal-close {
  position: absolute; top: 16px; right: 16px; background: none;
  border: none; font-size: 20px; cursor: pointer; color: var(--color-text-muted);
}
.modal h2 { font-size: 22px; margin-bottom: 4px; }
.modal .author { color: var(--color-text-muted); font-size: 14px; margin-bottom: 16px; }
.modal .summary-section { margin-bottom: 20px; }

<div class="categories" id="categories"></div>

<div class="book-grid" id="bookGrid"></div>

// State management with localStorage
function getReadBooks() { try { return JSON.parse(localStorage.getItem('qr_read') || '[]'); } catch(e) { return []; } }
function getFavBooks() { try { return JSON.parse(localStorage.getItem('qr_favs') || '[]'); } catch(e) { return []; } }
function setReadBooks(arr) { try { localStorage.setItem('qr_read', JSON.stringify(arr)); } catch(e) {} }
function setFavBooks(arr) { try { localStorage.setItem('qr_favs', JSON.stringify(arr)); } catch(e) {} }

function toggleRead(index, e) {
  if(e) e.stopPropagation();
  let reads = getReadBooks();
  if(reads.includes(index)) { reads = reads.filter(i => i !== index); }
  else { reads.push(index); }
  setReadBooks(reads);
  
// Text-to-Speech Audio Feature
let currentUtterance = null;
let isSpeaking = false;
let selectedVoice = null;
let speechRate = 0.85;

function populateVoices() {
  const voices = speechSynthesis.getVoices();
  const select = document.getElementById('voiceSelect');
  if (!select || voices.length === 0) return;
  
  select.innerHTML = '';
  voices.forEach((voice, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = voice.name + ' (' + voice.lang + ')';
    if (voice.default) opt.selected = true;
    select.appendChild(opt);
  });
  
  // Default to a natural-sounding voice if available
  const preferred = voices.findIndex(v => v.name.includes('Samantha') || v.name.includes('Google UK English Female') || v.name.includes('Natural'));
  if (preferred >= 0) { select.value = preferred; selectedVoice = voices[preferred]; }
}

function setVoice(index) {
  const voices = speechSynthesis.getVoices();
  selectedVoice = voices[index] || null;
  // Apply immediately if currently speaking
  if (isSpeaking && currentBookIndex >= 0) {
    speechSynthesis.cancel();
    isSpeaking = false;
    speakBook(currentBookIndex);
  }
}

function setSpeed(val) {
  speechRate = parseFloat(val);
  document.getElementById('speedVal').textContent = val + 'x';
  // Apply immediately if currently speaking
  if (isSpeaking && currentBookIndex >= 0) {
    speechSynthesis.cancel();
    isSpeaking = false;
    speakBook(currentBookIndex);
  }
}

let currentBookIndex = -1;

function speakBook(index) {
  const book = books[index];
  
  if (isSpeaking && currentBookIndex === index) {
    speechSynthesis.cancel();
    isSpeaking = false;
    currentBookIndex = -1;
    updateSpeakButtons();
    return;
  }
  
  // Stop any current speech before starting new
  if (isSpeaking) {
    speechSynthesis.cancel();
    isSpeaking = false;
  }
  
  currentBookIndex = index;
  
  const text = book.title + '... by ' + book.author + '.... ' + book.summary + '.... Key takeaways.... ' + book.keyPoints.map((p, i) => 'Point ' + (i+1) + '... ' + p).join('.... ');
  
  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.rate = speechRate;
  currentUtterance.pitch = 1.05;
  currentUtterance.volume = 1;
  
  if (selectedVoice) {
    currentUtterance.voice = selectedVoice;
  } else {
    const voices = speechSynthesis.getVoices();
    const preferred = voices.find(v => v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Natural'));
    if (preferred) currentUtterance.voice = preferred;
  }
  
  currentUtterance.onend = function() {
    isSpeaking = false;
    currentBookIndex = -1;
    updateSpeakButtons();
  };
  
  isSpeaking = true;
  speechSynthesis.speak(currentUtterance);
  updateSpeakButtons();
}

function stopSpeaking() {
  speechSynthesis.cancel();
  isSpeaking = false;
  updateSpeakButtons();
}

function updateSpeakButtons() {
  document.querySelectorAll('.listen-btn').forEach(btn => {
    btn.classList.toggle('listening', isSpeaking);
  });
}

// Load voices
speechSynthesis.onvoiceschanged = populateVoices;
setTimeout(populateVoices, 100);

renderAll();
}

  else { favs.push(index); }
  setFavBooks(favs);

function updateStats() {
  document.getElementById('totalCount').textContent = books.length;
  document.getElementById('readCount').textContent = getReadBooks().length;
  document.getElementById('favCount').textContent = getFavBooks().length;
}

const categories = ["All", "Favorites", "Read", ...new Set(books.map(b => b.category))];
let currentCategory = "All";

function renderCategories() {
  const container = document.getElementById('categories');
  container.innerHTML = categories.map((cat, i) =>
    `<button class="cat-btn ${cat === currentCategory ? 'active' : ''}" onclick="filterByCategory('${cat}', this)">${cat}</button>`
  ).join('');
}

function getFilteredBooks() {
  const reads = getReadBooks();
  const favs = getFavBooks();
  let filtered = books;
  if(currentCategory === 'Favorites') filtered = books.filter((_, i) => favs.includes(i));
  else if(currentCategory === 'Read') filtered = books.filter((_, i) => reads.includes(i));
  else if(currentCategory !== 'All') filtered = books.filter(b => b.category === currentCategory);
  
  const query = document.getElementById('searchInput').value.toLowerCase();
  if(query) filtered = filtered.filter(b =>
    b.title.toLowerCase().includes(query) || b.author.toLowerCase().includes(query) || b.category.toLowerCase().includes(query)
  );
  return filtered;
}

function renderBooks(filteredBooks) {
  const grid = document.getElementById('bookGrid');
  const reads = getReadBooks();
  const favs = getFavBooks();
  
  grid.innerHTML = filteredBooks.map(book => {
    const i = books.indexOf(book);
    const isRead = reads.includes(i);
    const isFav = favs.includes(i);
    return `
    <div class="book-card ${isRead ? 'is-read' : ''}" onclick="openBook(${i})">
      <div class="card-badges">
        ${isRead ? '<span class="badge read-badge"><i class="fa-solid fa-check"></i></span>' : ''}
        ${isFav ? '<span class="badge fav-badge"><i class="fa-solid fa-star"></i></span>' : ''}
      </div>
      <span class="book-category" style="background:${book.color};color:${book.textColor}">${book.category}</span>
      <h3>${book.title}</h3>
      <p class="author">by ${book.author}</p>
      <p class="read-time"><i class="fa-regular fa-clock"></i> ${book.readTime} read</p>
      <div class="card-actions">
        <button class="${isRead ? 'active-read' : ''}" onclick="toggleRead(${i}, event)">
          <i class="fa-solid fa-${isRead ? 'check-circle' : 'circle'}"></i> ${isRead ? 'Read' : 'Mark read'}
        </button>
        <button class="${isFav ? 'active-fav' : ''}" onclick="toggleFav(${i}, event)">
          <i class="fa-${isFav ? 'solid' : 'regular'} fa-star"></i> ${isFav ? 'Saved' : 'Save'}
        </button>
        <button class="listen-btn" onclick="speakBook(${i}); event.stopPropagation();">
          <i class="fa-solid fa-headphones"></i> Listen
        </button>
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  updateStats();
  renderCategories();
  renderBooks(getFilteredBooks());
}
